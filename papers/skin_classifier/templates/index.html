<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Skin Disease Classifier</title>
  <style>
    :root { --bg:#0b1220; --panel:#161f38; --accent:#38bdf8; --text:#e8edf6; --muted:#94a3b8; --warn:#fbbf24; --danger:#fb7185; }
    * { box-sizing:border-box; } body { margin:0; font-family:system-ui,Segoe UI,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:560px; margin:0 auto; padding:1.2rem; }
    .banner { background:rgba(251,191,36,.12); border:1px solid rgba(251,191,36,.3); color:var(--warn); padding:.7rem 1rem; border-radius:10px; font-size:.85rem; margin-bottom:1rem; }
    .card { background:var(--panel); border:1px solid #29324d; border-radius:14px; padding:1.3rem; margin-bottom:1rem; }
    h1 { font-size:1.3rem; } h2 { font-size:1.05rem; }
    input,select,button { font:inherit; padding:.6rem .8rem; border-radius:10px; border:1px solid #29324d; background:#0c1326; color:var(--text); width:100%; margin:.3rem 0; }
    button { background:var(--accent); color:#04121f; border:none; font-weight:700; cursor:pointer; }
    .bar { height:9px; background:#0c1326; border-radius:99px; overflow:hidden; margin:.3rem 0; }
    .bar>div { height:100%; background:var(--accent); }
    .muted { color:var(--muted); font-size:.85rem; } .warn { color:var(--warn); } .danger { color:var(--danger); }
    img.preview { max-width:100%; border-radius:10px; margin-top:.6rem; }
    .pill { font-size:.72rem; padding:.15rem .5rem; border-radius:999px; background:#29324d; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔬 AI Skin Disease Classifier</h1>
    <div class="banner">Decision support only — this tool does NOT provide a clinical diagnosis. Always seek confirmation from a qualified clinician.</div>
    <div class="card">
      <h2>Upload a photo</h2>
      <input type="file" id="image" accept="image/*" />
      <img id="preview" class="preview" style="display:none" />
      <label class="muted">Skin tone (optional, for fairness monitoring)</label>
      <select id="fitzpatrick">
        <option value="">Prefer not to say</option>
        <option value="2">Fitzpatrick I–III (lighter)</option>
        <option value="5">Fitzpatrick IV–VI (darker)</option>
      </select>
      <button id="go">Analyse</button>
    </div>
    <div class="card" id="result" style="display:none"></div>
  </div>
  <script>
    const $ = (id) => document.getElementById(id)
    $('image').onchange = (e) => { const f = e.target.files[0]; if (f) { $('preview').src = URL.createObjectURL(f); $('preview').style.display = 'block' } }
    $('go').onclick = async () => {
      const f = $('image').files[0]; if (!f) return alert('Choose an image first.')
      const fd = new FormData(); fd.append('image', f); fd.append('fitzpatrick', $('fitzpatrick').value)
      $('result').style.display = 'block'; $('result').innerHTML = 'Analysing…'
      const res = await fetch('/api/classify', { method: 'POST', body: fd })
      const d = await res.json()
      if (d.error) { $('result').innerHTML = '<span class="danger">' + d.error + '</span>'; return }
      let html = '<h2>Result <span class="pill">' + d.mode + '</span></h2>'
      if (d.low_confidence) html += '<p class="warn">⚠ Low confidence — please seek clinical review regardless of the result.</p>'
      d.predictions.forEach((p, i) => {
        const pct = Math.round(p.confidence * 100)
        html += '<div><b>' + (i===0?'➤ ':'') + p.condition + '</b> — ' + pct + '%<div class="bar"><div style="width:' + pct + '%"></div></div></div>'
      })
      html += '<p class="muted">' + d.info + '</p><p class="muted"><i>' + d.disclaimer + '</i></p>'
      $('result').innerHTML = html
    }
  </script>
</body>
</html>
