<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 320px; margin: 0; font-family: system-ui, sans-serif; background: #0b1020; color: #e5e7eb; }
    .head { padding: 12px 14px; font-weight: 700; border-bottom: 1px solid #233; }
    .verdict { padding: 14px; }
    .safe { color: #4ade80; } .danger { color: #f87171; }
    .bar { height: 8px; background: #1c2536; border-radius: 99px; overflow: hidden; margin: 8px 0; }
    .bar > div { height: 100%; }
    .muted { color: #94a3b8; font-size: 12px; }
    h3 { margin: 10px 14px 4px; font-size: 13px; }
    .item { padding: 6px 14px; border-top: 1px solid #1a2333; font-size: 12px; }
    a { color: #38bdf8; }
  </style>
</head>
<body>
  <div class="head">🛡️ Phishing Shield</div>
  <div class="verdict" id="verdict">Checking current page…</div>
  <h3>Recent</h3>
  <div id="history"></div>
  <div class="item"><a href="#" id="opts">Settings (threshold & whitelist)</a></div>
  <script src="popup.js"></script>
</body>
</html>
