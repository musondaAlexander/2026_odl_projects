# In-memory H2 in MySQL-compatibility mode so JUnit runs without a live MySQL server.
spring.datasource.url=jdbc:h2:mem:examtest;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
app.seed.enabled=false
app.jwt.secret=test-secret-test-secret-test-secret-test-secret-0123456789
plagiarism.service.url=http://localhost:0
