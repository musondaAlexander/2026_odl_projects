spring.application.name=online-exam
server.port=${SERVER_PORT:8080}

# --- MySQL (live exam database) ---
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:exam}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:1234@abcd}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- JWT ---
app.jwt.secret=${JWT_SECRET:online-exam-dev-secret-change-in-production-7f8e9d0c1b2a3948f5e6d7c8b9a0}
app.jwt.expiration-ms=${JWT_EXPIRES_MS:86400000}

# --- Python TF-IDF plagiarism microservice ---
plagiarism.service.url=${PLAGIARISM_URL:http://localhost:8090}

# --- CORS (React dev server) ---
app.cors.origin=${CORS_ORIGIN:http://localhost:5179}

# --- Seed demo data on first run ---
app.seed.enabled=${SEED_ENABLED:true}

# Auto-submit sweeper cadence (ms): finalise attempts past their deadline
app.attempt.sweeper-ms=${ATTEMPT_SWEEPER_MS:60000}

spring.jackson.serialization.write-dates-as-timestamps=false
logging.level.org.hibernate.SQL=warn
